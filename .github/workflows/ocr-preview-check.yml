name: OCR preview check

on:
  push:
    branches:
      - experiment/ocr-pipeline
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-package-lock --no-audit --no-fund
      - name: Test and build
        run: npm run build
